name: Simple Docker Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  dockerhub:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_USERNAME || vars.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASS: ${{ secrets.DOCKERHUB_TOKEN != '' && secrets.DOCKERHUB_TOKEN || vars.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${DOCKERHUB_USER}" ] || [ -z "${DOCKERHUB_PASS}" ]; then
            echo "Missing Docker Hub credentials."
            echo "Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in GitHub Secrets (preferred) or Repository Variables."
            exit 1
          fi

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ env.DOCKERHUB_PASS }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/backend:latest
            ${{ env.DOCKERHUB_USER }}/backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/dockerfile
          push: true
          tags: |
            ${{ env.DOCKERHUB_USER }}/frontend:latest
            ${{ env.DOCKERHUB_USER }}/frontend:${{ github.sha }}
