name: Simple Docker Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  dockerhub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pipeline-ci-cd-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/pipeline-ci-cd-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pipeline-ci-cd-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/pipeline-ci-cd-frontend:${{ github.sha }}
