name: Deploy Docker Images

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./backend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-ci-cd-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-ci-cd-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-ci-cd-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-ci-cd-frontend:${{ github.sha }}
