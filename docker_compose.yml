services:
  backend:
    build:
      context: .
      dockerfile: backend/dockerfile
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/dockerfile
    depends_on:
      - backend
    environment:
      BACKEND_API_URL: http://backend:8000/predict
    ports:
      - "8501:8501"
